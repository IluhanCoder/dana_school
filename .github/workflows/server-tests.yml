name: Server Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: server
        run: |
          npm install

      - name: Run tests
        working-directory: server
        env:
          JWT_SECRET: ci_secret
          JWT_REFRESH_SECRET: ci_refresh_secret
        run: |
          npm test
